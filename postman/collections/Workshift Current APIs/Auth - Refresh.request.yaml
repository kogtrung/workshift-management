$kind: http-request
url: "{{baseUrl}}/api/v1/auth/refresh"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "refreshToken": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    code: >-
      const jsonData = pm.response.json();

      if (jsonData && jsonData.data) {
        if (jsonData.data.token) pm.collectionVariables.set('accessToken', jsonData.data.token);
        if (jsonData.data.refreshToken) pm.collectionVariables.set('refreshToken', jsonData.data.refreshToken);
      }
    language: text/javascript
order: 3000
