$kind: http-request
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "usernameOrEmail": "member02",
      "password": "secret123"
    }
scripts:
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();
      if (jsonData && jsonData.data && jsonData.data.token) {
        pm.collectionVariables.set('memberAccessToken', jsonData.data.token);
      }
    language: text/javascript
order: 6000
